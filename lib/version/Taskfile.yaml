version: '3'

tasks:
  default:
    desc: "Show version and cfgd status"
    summary: |
      Print the CLI's current version and cfgd tracking status, if any.

      Examples:
        {{.CLI_NAME}} version
    cmd: "'{{.FRAMEWORK_DIR}}/lib/version/version.sh' '{{.CLI_DIR}}' '{{.FRAMEWORK_DIR}}'"

  setup:
    desc: "Set up cfgd versioning"
    summary: |
      One-time initialisation of cfgd version tracking for this CLI.
      Enables `version upgrade` and `version set`.

      Examples:
        {{.CLI_NAME}} version setup
    cmd: "'{{.FRAMEWORK_DIR}}/lib/version/setup.sh' '{{.CLI_DIR}}' '{{.FRAMEWORK_DIR}}'"

  bump:
    desc: "Cut a new release (patch/minor/major)"
    summary: |
      Bump CLI version, write .clift.yaml + .env (+ module.yaml when present)
      atomically, commit, and tag. Tag is `vX.Y.Z` for standalone CLIs and
      `<cli-name>/vX.Y.Z` when this CLI is a module inside a parent cfgd repo.

      Examples:
        {{.CLI_NAME}} version bump                # patch (default)
        {{.CLI_NAME}} version bump minor --push
        {{.CLI_NAME}} version bump major --dry-run
    cmd: "'{{.FRAMEWORK_DIR}}/lib/version/bump.sh' '{{.CLI_DIR}}' '{{.FRAMEWORK_DIR}}'"

  list:
    desc: "List available versions"
    summary: |
      Enumerate published versions for this CLI. Sources, auto-detected:
      cfgd-managed reads `cfgd module list --json`; standalone walks local
      and fetched git tags (`vX.Y.Z` and `<cli-name>/vX.Y.Z` forms).

      The row marked `*` is the locally installed version.

      Examples:
        {{.CLI_NAME}} version list
        {{.CLI_NAME}} version list --json
        {{.CLI_NAME}} version list --limit 5
        {{.CLI_NAME}} version list --since v1.0.0
        {{.CLI_NAME}} version list -q       # one version per line
    cmd: "'{{.FRAMEWORK_DIR}}/lib/version/list.sh' '{{.CLI_DIR}}' '{{.FRAMEWORK_DIR}}'"

  check:
    desc: "Check whether a newer version is available"
    summary: |
      Compare the installed version against the latest available — via
      `cfgd module list --json` when cfgd-managed, otherwise via local git
      tags. Prints `up to date (vX.Y.Z)` or `vX.Y.Z → vA.B.C available`.

      Examples:
        {{.CLI_NAME}} version check
        {{.CLI_NAME}} version check --json
        {{.CLI_NAME}} version check -q   # silent when up to date
    cmd: "'{{.FRAMEWORK_DIR}}/lib/version/check.sh' '{{.CLI_DIR}}' '{{.FRAMEWORK_DIR}}'"

  sync:
    desc: "Regenerate module.yaml from .clift.yaml"
    summary: |
      Refresh metadata in module.yaml so it matches .clift.yaml. Idempotent.
      Prints a diff when it changes anything.

      Examples:
        {{.CLI_NAME}} version sync
        {{.CLI_NAME}} version sync --dry-run
    cmd: "'{{.FRAMEWORK_DIR}}/lib/version/sync.sh' '{{.CLI_DIR}}' '{{.FRAMEWORK_DIR}}'"

  upgrade:
    desc: "Upgrade to latest version via cfgd"
    aliases: [update]
    summary: |
      Pull the latest tagged release through cfgd. Requires `version setup`
      to have been run once.

      Examples:
        {{.CLI_NAME}} version upgrade
    cmd: "'{{.FRAMEWORK_DIR}}/lib/version/upgrade.sh' '{{.CLI_DIR}}' '{{.FRAMEWORK_DIR}}'"

  set:
    desc: "Pin to a specific version"
    summary: |
      Pin the CLI to a specific tagged version via cfgd.

      Examples:
        {{.CLI_NAME}} version set 1.2.3
    cmd: "'{{.FRAMEWORK_DIR}}/lib/version/set.sh' '{{.CLI_DIR}}' '{{.FRAMEWORK_DIR}}' {{.CLI_ARGS}}"
