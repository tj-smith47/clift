version: '3'

# Deprecation stub — `clift import` was retired in favor of
# `clift init <name> --from PATH`. The default task here just dispatches
# to redirect.sh which prints a one-line stderr message and exits 2.
# Hidden from --help (vars.HIDDEN: true) so it doesn't surface as a real
# command, but still discoverable when typed so the user gets the redirect.

vars:
  HIDDEN: true

tasks:
  default:
    desc: "(removed — use 'clift init --from PATH')"
    cmd: "'{{.FRAMEWORK_DIR}}/lib/import/redirect.sh'"
