name: Feature Request
description: Suggest a new feature or enhancement
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Thank you for suggesting a feature! Please describe your idea.

        clift is a framework — proposals that change the consumer-facing surface
        (flag schema, env var contract, router behavior, completion contract, log
        themes, override hooks, etc.) should call out the impact on existing CLIs
        built on clift.

  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What problem does this solve? What's the use case for a CLI built on clift?
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed Solution
      description: How do you think this should work? Include a sample `Taskfile.yaml` schema, command-script contract, or CLI invocation where appropriate.
      render: yaml
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
      description: Any alternative approaches you've considered (override hook, per-CLI implementation, third-party tool, etc.).

  - type: textarea
    id: context
    attributes:
      label: Additional Context
      description: Any other context, screenshots, or config examples. If this is a breaking change for existing consumer CLIs, say so here.
