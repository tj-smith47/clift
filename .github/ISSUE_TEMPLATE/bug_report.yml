name: Bug Report
description: Report a bug in clift
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thank you for reporting a bug. Please fill out the sections below.

  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear description of the bug.
    validations:
      required: true

  - type: textarea
    id: reproduce
    attributes:
      label: Steps to Reproduce
      description: Steps to reproduce the behavior. Include the `clift` or consumer-CLI invocation, relevant `Taskfile.yaml` excerpt, and any command script involved.
      placeholder: |
        1. `clift init ~/mycli --mode standard`
        2. Add command with `vars.FLAGS: ...`
        3. Run `mycli <cmd> --flag value`
        4. See error
      render: shell
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What you expected to happen.
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
      description: What actually happened. Include error messages and `--verbose` output if applicable.
      render: shell
    validations:
      required: true

  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Include `bash --version`, `task --version`, `jq --version`, `yq --version`, and the clift commit/tag you are on (`git -C ~/.clift rev-parse --short HEAD` or the version reported by `mycli --version`).
      render: text
    validations:
      required: true

  - type: input
    id: os
    attributes:
      label: Operating System
      placeholder: e.g., macOS 14.2, Ubuntu 22.04
    validations:
      required: true
