version: '3'

silent: true
output:
  group:
    begin: ''
    end: ''
set: [errexit, pipefail]
dotenv: ['.env']

vars:
  FLAGS:
    - {name: help, short: h, type: bool, desc: "Show help"}
    - {name: verbose, short: v, type: bool, desc: "Verbose output"}
    - {name: quiet, short: q, type: bool, desc: "Suppress info/success output"}
    - {name: no-color, type: bool, desc: "Disable color output"}
    - {name: version, short: V, type: bool, desc: "Show version"}
  # Persistent flags — accepted either before or after the command token.
  PERSISTENT_FLAGS:
    - {name: profile, short: p, type: string, default: default, desc: "Config profile"}
    - {name: config-file, type: string, desc: "Override config file path"}

includes:
  _help:
    taskfile: '{{.FRAMEWORK_DIR}}/lib/help'
  _new:
    taskfile: '{{.FRAMEWORK_DIR}}/lib/scaffold'
    vars: {CLI_DIR: '{{.CLI_DIR}}', FRAMEWORK_DIR: '{{.FRAMEWORK_DIR}}'}
  config:
    taskfile: '{{.FRAMEWORK_DIR}}/lib/config'
    vars: {CLI_DIR: '{{.CLI_DIR}}', FRAMEWORK_DIR: '{{.FRAMEWORK_DIR}}'}
  completion:
    taskfile: '{{.FRAMEWORK_DIR}}/lib/completion'
    vars: {TASKFILE_PATH: '{{.CLI_DIR}}/Taskfile.yaml', CLI_NAME: '{{.CLI_NAME}}'}
  update:
    taskfile: '{{.FRAMEWORK_DIR}}/lib/update'
    vars: {FRAMEWORK_DIR: '{{.FRAMEWORK_DIR}}'}
  # User commands
  deploy:
    taskfile: ./cmds/deploy
  logs:
    taskfile: ./cmds/logs
  restart:
    taskfile: ./cmds/restart
  status:
    taskfile: ./cmds/status
  # Hidden command — parses + runs, absent from help + completion.
  internal:
    taskfile: ./cmds/internal

tasks:
  default:
    cmd:
      task: _help:list
