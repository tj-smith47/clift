version: '3'

vars:
  FLAGS:
    - {name: target, short: t, type: string, default: staging, desc: "Target environment"}
    - {name: wide, short: w, type: bool, desc: "Show extended info"}

tasks:
  default:
    desc: "Show deployment status"
    summary: |
      Display the current deployment status for an environment.

      Examples:
        kube status
        kube status --target prod --wide
    vars:
      FLAGS:
        - {name: target, short: t, type: string, default: staging, desc: "Target environment"}
        - {name: wide, short: w, type: bool, desc: "Show extended info"}
    cmd: "CLI_ARGS='{{.CLI_ARGS}}' '{{.FRAMEWORK_DIR}}/lib/router/router.sh' '{{.TASK}}'"
