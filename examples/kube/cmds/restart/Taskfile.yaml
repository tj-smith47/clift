version: '3'

vars:
  FLAGS:
    - {name: namespace, short: n, type: string, default: "clift-demo", desc: "Namespace"}
    - {name: timeout, short: t, type: string, default: "60s", desc: "Rollout timeout"}

tasks:
  default:
    desc: "Restart a deployment (wraps kubectl rollout restart + status)"
    summary: |
      Restart a deployment and wait for the rollout to finish. Wraps two
      kubectl invocations — rollout restart, then rollout status — behind
      a single gum-spinner UX so the common case is one simple command
      instead of a multi-step recipe.

      Examples:
        kube restart web
        kube restart api --namespace staging
        kube restart worker --timeout 2m
    vars:
      FLAGS:
        - {name: namespace, short: n, type: string, default: "clift-demo", desc: "Namespace"}
        - {name: timeout, short: t, type: string, default: "60s", desc: "Rollout timeout"}
    cmd: "CLI_ARGS='{{.CLI_ARGS}}' '{{.FRAMEWORK_DIR}}/lib/router/router.sh' '{{.TASK}}'"
