version: '3'

tasks:
  default:
    desc: "Capture a note (create or append depending on current note + --on)"
    aliases: [n]
    summary: |
      Capture a note. With no current note set and no --on, creates a quick
      capture in inbox/. With a current note set, appends there. --on overrides
      for a single call without mutating current.

      Examples:
        jarvis note "deployed the shim"
        jarvis note "quick thought" --tag idea --tag infra
        jarvis note "unrelated" --on "Perf Investigation"
    vars:
      FLAGS:
        - {name: tag, type: list, desc: "Tag (repeatable)"}
        - {name: on, type: string, desc: "Append to this note for one call (title or slug)"}
        - {name: no-timestamp, type: bool, desc: "Skip the timestamp header on append"}
        - {name: format, type: string, desc: "Strftime format for append header"}
    cmd: "CLI_ARGS='{{.CLI_ARGS}}' '{{.FRAMEWORK_DIR}}/lib/router/router.sh' '{{.TASK}}'"

  new:
    desc: "Create a new note with a title and optional kind"
    aliases: [create]
    summary: |
      Create a new note. Opens $EDITOR when available; --no-edit skips.

      Examples:
        jarvis note new "Etcd Restore Runbook" --kind ref
        jarvis note new "1on1 Alice" --kind meeting --tag alice
        jarvis note new "Quick capture" --no-edit
    vars:
      FLAGS:
        - {name: kind, type: string, default: inbox, desc: "Note kind",
           choices: [inbox, meeting, ref, project, daily]}
        - {name: tag, type: list, desc: "Tag (repeatable)"}
        - {name: no-edit, type: bool, desc: "Skip opening $EDITOR"}
    cmd: "CLI_ARGS='{{.CLI_ARGS}}' '{{.FRAMEWORK_DIR}}/lib/router/router.sh' '{{.TASK}}'"

  daily:
    desc: "Today's daily note (create or append)"
    summary: |
      Resolves to daily/YYYY-MM-DD.md for today. Creates from
      templates/daily.md when missing. Body argument appends; no body
      opens $EDITOR (unless --no-edit / non-tty).

      Examples:
        jarvis note daily                           # open in $EDITOR (or no-op with --no-edit)
        jarvis note daily "finished the rewrite"    # append
        jarvis note daily --no-edit                 # ensure today's file exists, no editor
    vars:
      FLAGS:
        - {name: no-edit, type: bool, desc: "Skip opening $EDITOR"}
    cmd: "CLI_ARGS='{{.CLI_ARGS}}' '{{.FRAMEWORK_DIR}}/lib/router/router.sh' '{{.TASK}}'"
